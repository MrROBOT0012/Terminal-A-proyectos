<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Terminal A">
<title>Terminal A · Proyectos</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f2f2f7; --surface:#ffffff; --surface2:#e8e8ed;
  --border:rgba(60,60,67,.2); --border2:rgba(60,60,67,.32);
  --text:#1c1c1e; --text2:#48484a; --text3:#6d6d72;
  --accent:#007aff; --accent-dim:rgba(0,122,255,.1);
  --green:#34c759; --green-dim:rgba(52,199,89,.1);
  --amber:#ff9500; --amber-dim:rgba(255,149,0,.1);
  --red:#ff3b30; --red-dim:rgba(255,59,48,.09);
  --mono:'DM Mono',monospace; --sans:-apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',sans-serif;
  --r:12px; --r-sm:8px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:env(safe-area-inset-bottom,20px);}

/* TOPBAR */
.topbar{position:sticky;top:0;z-index:100;background:rgba(242,242,247,.92);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-bottom:1px solid var(--border);padding:12px 16px;}
.topbar-inner{display:flex;align-items:center;justify-content:space-between;max-width:900px;margin:0 auto;gap:12px;}
.topbar-left h1{font-size:15px;font-weight:600;letter-spacing:-.2px;}
.topbar-left p{font-size:11px;color:#6d6d72;font-family:var(--mono);margin-top:1px;}
.sync-wrap{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text3);font-family:var(--mono);flex-shrink:0;}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--text3);transition:background .4s;}
.sync-dot.live{background:var(--green);box-shadow:0 0 5px var(--green);}

/* MAIN */
.main{max-width:900px;margin:0 auto;padding:14px 16px 48px;}

/* METRICS */
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px;}
.metric{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:12px;box-shadow:0 1px 3px rgba(0,0,0,.06);}
.metric-label{font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);font-family:var(--mono);margin-bottom:5px;font-weight:500;}
.metric-value{font-size:20px;font-weight:600;letter-spacing:-.5px;}
.mv-accent{color:var(--accent);} .mv-red{color:var(--red);} .mv-amber{color:var(--amber);} .mv-green{color:var(--green);}

/* TOOLBAR */
.toolbar{display:flex;gap:8px;margin-bottom:10px;align-items:center;}
.search-wrap{position:relative;flex:1;min-width:120px;}
.search-wrap input{width:100%;background:#f9f9fb;border:1px solid rgba(60,60,67,.22);border-radius:var(--r-sm);padding:8px 12px 8px 32px;color:var(--text);font-size:13px;font-family:var(--sans);outline:none;transition:border-color .2s;}
.search-wrap input:focus{border-color:var(--border2);}
.search-wrap input::placeholder{color:var(--text3);}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:13px;pointer-events:none;}
.add-btn{flex-shrink:0;font-size:12px;font-family:var(--mono);padding:8px 14px;border-radius:var(--r-sm);border:1px solid var(--accent);background:var(--accent-dim);color:var(--accent);cursor:pointer;transition:all .15s;white-space:nowrap;}
.add-btn:hover{background:var(--accent);color:#fff;}
.pdf-btn{flex-shrink:0;font-size:12px;font-family:var(--mono);padding:8px 14px;border-radius:var(--r-sm);border:1px solid rgba(60,60,67,.25);background:var(--surface);color:var(--text2);cursor:pointer;transition:all .15s;white-space:nowrap;}
.pdf-btn:hover{border-color:var(--text2);color:var(--text);background:var(--surface2);}
.pdf-proj-btn{font-size:11px;font-family:var(--mono);padding:6px 12px;border-radius:var(--r-sm);border:1px solid rgba(60,60,67,.2);background:var(--surface);color:var(--text3);cursor:pointer;transition:all .15s;white-space:nowrap;}
.pdf-proj-btn:hover{border-color:var(--text2);color:var(--text2);}

/* FILTER TABS */
.filter-tabs{display:flex;gap:2px;margin-bottom:10px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-sm);padding:3px;overflow-x:auto;scrollbar-width:none;}
.filter-tabs::-webkit-scrollbar{display:none;}
.ftab{flex-shrink:0;font-size:11px;font-family:var(--mono);padding:5px 12px;border-radius:4px;border:none;background:transparent;color:var(--text3);cursor:pointer;transition:all .15s;white-space:nowrap;}
.ftab.active{background:var(--surface2);color:var(--text);}
.ftab .cnt{margin-left:4px;opacity:.45;}

/* TABLE */
.table-wrap{border:1px solid var(--border);border-radius:var(--r);overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.07);}
.tbl-head{display:grid;grid-template-columns:36px 1fr 96px 108px 28px;padding:8px 14px;background:var(--surface2);border-bottom:1px solid var(--border);font-size:10px;font-family:var(--mono);text-transform:uppercase;letter-spacing:.6px;color:var(--text3);gap:8px;align-items:center;}
.tbl-row{display:grid;grid-template-columns:36px 1fr 96px 108px 28px;padding:10px 12px;border-bottom:1px solid rgba(60,60,67,.13);gap:8px;align-items:center;cursor:pointer;transition:background .12s;background:var(--surface);}
.tbl-row:last-of-type{border-bottom:none;}
.tbl-row:hover{background:var(--surface2);}
.tbl-row.alert-row{border-left:2px solid var(--red);}
.tbl-row.expanded{background:var(--surface2);}
.col-num{font-family:var(--mono);font-size:11px;color:#6d6d72;font-weight:500;}
.col-name{font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:flex;align-items:center;gap:6px;}
.alert-dot{width:5px;height:5px;border-radius:50%;background:var(--red);flex-shrink:0;}
.col-status{display:flex;}
.col-cti{font-family:var(--mono);font-size:12px;text-align:right;}
.col-cti.red{color:var(--red);} .col-cti.muted{color:var(--text3);}
.col-chev{text-align:center;color:var(--text3);font-size:11px;transition:transform .2s;}
.col-chev.open{transform:rotate(180deg);}
.badge{font-size:10px;font-family:var(--mono);padding:2px 7px;border-radius:20px;font-weight:500;white-space:nowrap;}
.b-complete{background:var(--green-dim);color:var(--green);}
.b-progress{background:var(--amber-dim);color:var(--amber);}
.b-notstarted{background:rgba(255,255,255,.04);color:var(--text3);}

/* DRAWER */
.drawer{display:none;background:var(--surface2);border-bottom:1px solid var(--border);padding:16px 14px;}
.drawer.open{display:block;}
.drawer-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
@media(max-width:560px){.drawer-grid{grid-template-columns:1fr;}}
.field-group{display:flex;flex-direction:column;gap:5px;}
.field-group.full{grid-column:1/-1;}
.field-label{font-size:10px;font-family:var(--mono);text-transform:uppercase;letter-spacing:.6px;color:var(--text3);}
.field-input{background:#f9f9fb;border:1px solid rgba(60,60,67,.22);border-radius:var(--r-sm);padding:8px 10px;color:var(--text);font-size:13px;font-family:var(--sans);outline:none;width:100%;transition:border-color .2s;}
.field-input:focus{border-color:var(--border2);}
.field-input.mono{font-family:var(--mono);font-size:12px;}
.field-input[type="date"]{color-scheme:light;}
textarea.field-input{resize:vertical;min-height:60px;line-height:1.5;font-size:12px;}
.dsec{margin-bottom:14px;}
.dsec-title{font-size:10px;font-family:var(--mono);text-transform:uppercase;letter-spacing:.6px;color:#6d6d72;font-weight:600;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border);}
.status-row{display:flex;gap:6px;flex-wrap:wrap;}
.s-opt{font-size:11px;font-family:var(--mono);padding:5px 12px;border-radius:20px;border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;transition:all .15s;}
.s-opt.sel-c{background:var(--green-dim);border-color:var(--green);color:var(--green);}
.s-opt.sel-p{background:var(--amber-dim);border-color:var(--amber);color:var(--amber);}
.s-opt.sel-n{background:rgba(255,255,255,.04);border-color:var(--border2);color:var(--text2);}
.alert-box{background:var(--red-dim);border:1px solid rgba(240,82,82,.18);border-radius:var(--r-sm);padding:8px 11px;font-size:11px;color:var(--red);font-family:var(--mono);margin-bottom:10px;line-height:1.5;}
.drawer-actions{display:flex;align-items:center;gap:10px;margin-top:12px;}
.save-btn{font-size:11px;font-family:var(--mono);padding:7px 16px;border-radius:var(--r-sm);border:1px solid var(--accent);background:var(--accent-dim);color:var(--accent);cursor:pointer;transition:all .15s;}
.save-btn:hover{background:var(--accent);color:#fff;}
.saved-lbl{font-size:11px;color:var(--green);font-family:var(--mono);opacity:0;transition:opacity .3s;}
.saved-lbl.show{opacity:1;}

/* EMPTY / LOADING */
.empty{text-align:center;padding:36px 16px;color:var(--text3);font-size:12px;font-family:var(--mono);}
.loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:50vh;gap:12px;}
.loading-screen p{font-size:12px;color:var(--text3);font-family:var(--mono);}
.spinner{width:18px;height:18px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* TOAST */
.toast{position:fixed;bottom:calc(16px + env(safe-area-inset-bottom,0px));left:50%;transform:translateX(-50%) translateY(60px);background:var(--surface2);border:1px solid var(--border2);border-radius:var(--r-sm);padding:9px 18px;font-size:12px;font-family:var(--mono);color:var(--text);z-index:999;transition:transform .25s ease;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px);}
.modal-overlay.open{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:var(--r) var(--r) 0 0;padding:20px 16px calc(20px + env(safe-area-inset-bottom,0px));width:100%;max-width:600px;}
.modal h3{font-size:14px;font-weight:600;margin-bottom:14px;}
.modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
@media(max-width:480px){.modal-grid{grid-template-columns:1fr;}}
.modal-btns{display:flex;gap:8px;margin-top:14px;}
.modal-btns button{flex:1;padding:11px;border-radius:var(--r-sm);font-size:12px;font-family:var(--mono);cursor:pointer;border:1px solid var(--border2);}
.btn-cancel{background:transparent;color:var(--text2);}
.btn-save-m{background:var(--accent);border-color:var(--accent);color:#fff;}

@media(max-width:500px){
  .metrics{grid-template-columns:repeat(2,1fr);}
  .tbl-head,.tbl-row{grid-template-columns:28px 1fr 76px 86px 24px;}
}

.del-btn{font-size:11px;font-family:var(--mono);padding:6px 12px;border-radius:var(--r-sm);border:1px solid rgba(255,59,48,.3);background:rgba(255,59,48,.06);color:var(--red);cursor:pointer;transition:all .15s;margin-left:auto;}
.del-btn:hover{background:var(--red);color:#fff;border-color:var(--red);}

/* Confirm dialog */
.confirm-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:300;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
.confirm-overlay.open{display:flex;}
.confirm-box{background:var(--surface);border:1px solid var(--border2);border-radius:var(--r);padding:24px 20px;width:90%;max-width:340px;text-align:center;}
.confirm-box h3{font-size:15px;font-weight:600;color:var(--text);margin-bottom:8px;}
.confirm-box p{font-size:13px;color:var(--text2);line-height:1.5;margin-bottom:20px;}
.confirm-box .proj-name{font-weight:600;color:var(--text);}
.confirm-btns{display:flex;gap:8px;}
.confirm-btns button{flex:1;padding:11px;border-radius:var(--r-sm);font-size:13px;font-family:var(--mono);cursor:pointer;border:1px solid var(--border2);}
.btn-keep{background:var(--surface2);color:var(--text2);}
.btn-del-confirm{background:var(--red);border-color:var(--red);color:#fff;font-weight:600;}
</style>
</head>
<body>

  <div class="topbar-inner">

      <h1>Terminal A · RCCL</h1>
      <p>Puerto de Miami — TROAL / SATE</p>

    <div class="sync-wrap">
      <div class="sync-dot" id="syncDot"></div>
      <span id="syncLabel">conectando</span>
    </div>
  </div>
</div>

<div class="main">
  <div id="loadingScreen" class="loading-screen">
    <div class="spinner"></div>

  <div id="appContent" style="display:none">
    <div class="metrics" id="metricsEl"></div>

    <div class="toolbar">

        <span class="search-icon">⌕</span>
        <input type="text" id="searchInput" placeholder="Buscar proyecto, vendor, invoice..." />
      </div>
      <button class="add-btn" id="addBtn">+ Nuevo</button>
      <button class="pdf-btn" id="pdfAllBtn">&#8595; PDF General</button>
    </div>

    <div class="filter-tabs" id="filterTabs">
      <button class="ftab active" data-filter="all">Todos<span class="cnt" id="cnt-all"></span></button>
      <button class="ftab" data-filter="en-proceso">En proceso<span class="cnt" id="cnt-en-proceso"></span></button>
      <button class="ftab" data-filter="no-comenzado">No comenzados<span class="cnt" id="cnt-no-comenzado"></span></button>
      <button class="ftab" data-filter="completado">Completados<span class="cnt" id="cnt-completado"></span></button>
      <button class="ftab" data-filter="alerta">Alertas<span class="cnt" id="cnt-alerta"></span></button>
    </div>

    <div class="table-wrap">
      <div class="tbl-head">
        <span>#</span><span>Proyecto</span><span>Estado</span><span style="text-align:right">Pend. CTI</span><span></span>
      </div>
      <div id="tableBody"></div>
    </div>
  </div>
</div>


<!-- Confirm delete dialog -->
<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box">
    <h3>Eliminar proyecto</h3>
    <p>¿Estás seguro que deseas eliminar<br><span class="proj-name" id="confirmProjName"></span>?<br><span style="color:var(--red);font-size:12px;">Esta acción no se puede deshacer.</span></p>
    <div class="confirm-btns">
      <button class="btn-keep" id="confirmCancel">Cancelar</button>
      <button class="btn-del-confirm" id="confirmDelete">Eliminar</button>
    </div>
  </div>
</div>
<!-- MODAL NUEVO PROYECTO -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h3>Nuevo proyecto</h3>
    <div class="modal-grid">
      <div class="field-group full">
        <label class="field-label">Nombre del proyecto</label>
        <input class="field-input" type="text" id="nName" placeholder="Ej: Gangway Repair" />
      </div>
      <div class="field-group">
        <label class="field-label">Compañía / Vendor</label>
        <input class="field-input" type="text" id="nCompany" placeholder="Ej: Moon Air" />
      </div>
      <div class="field-group">
        <label class="field-label">Invoice(s)</label>
        <input class="field-input mono" type="text" id="nInvoice" placeholder="Ej: 1400, 1401" />
      </div>
      <div class="field-group">
        <label class="field-label">Total proyecto ($)</label>
        <input class="field-input mono" type="number" id="nTotal" placeholder="0.00" />
      </div>
      <div class="field-group">
        <label class="field-label">Pendiente CTI ($)</label>
        <input class="field-input mono" type="number" id="nPendingCTI" placeholder="0.00" />
      </div>
      <div class="field-group">
        <label class="field-label">Pendiente Vendor ($)</label>
        <input class="field-input mono" type="number" id="nPendingVendor" placeholder="0.00" />
      </div>
      <div class="field-group full">
        <label class="field-label">Notas</label>
        <textarea class="field-input" id="nNotes" placeholder="Observaciones, estado del trabajo..."></textarea>
      </div>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" id="modalCancel">Cancelar</button>
      <button class="btn-save-m" id="modalSave">Guardar proyecto</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

let allProjects=[], currentFilter='all', currentSearch='', openId=null, db;

const fmt = n => (n==null||n===''||n===0) ? '—' : '$'+Number(n).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtDate = d => d ? d.split('-').reverse().join('/') : '—';
const sLabel = s => s==='completado'?'Completado':s==='en-proceso'?'En proceso':'No comenzado';
const sBadge = s => s==='completado'?'b-complete':s==='en-proceso'?'b-progress':'b-notstarted';

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2400);}

function renderMetrics(){
  const pCTI=allProjects.reduce((a,p)=>a+(Number(p.pendingCTI)||0),0);
  const pVen=allProjects.reduce((a,p)=>a+(Number(p.pendingVendor)||0),0);
  const comp=allProjects.filter(p=>p.status==='completado').length;
  document.getElementById('metricsEl').innerHTML=`
    <div class="metric"><div class="metric-label">Total</div><div class="metric-value mv-accent">${allProjects.length}</div></div>
    <div class="metric"><div class="metric-label">Pend. CTI</div><div class="metric-value mv-red">${pCTI>0?'$'+Number(pCTI).toLocaleString('en-US',{maximumFractionDigits:0}):'$0'}</div></div>
    <div class="metric"><div class="metric-label">Pend. Vendor</div><div class="metric-value mv-amber">${pVen>0?'$'+Number(pVen).toLocaleString('en-US',{maximumFractionDigits:0}):'$0'}</div></div>
    <div class="metric"><div class="metric-label">Completados</div><div class="metric-value mv-green">${comp}/${allProjects.length}</div></div>
  `;
}

function updateCounts(){
  document.getElementById('cnt-all').textContent=allProjects.length;
  ['completado','en-proceso','no-comenzado'].forEach(f=>document.getElementById('cnt-'+f).textContent=allProjects.filter(p=>p.status===f).length);
  document.getElementById('cnt-alerta').textContent=allProjects.filter(p=>p.alert).length;
}

function getFiltered(){
  let f=allProjects;
  if(currentFilter==='completado') f=f.filter(p=>p.status==='completado');
  else if(currentFilter==='en-proceso') f=f.filter(p=>p.status==='en-proceso');
  else if(currentFilter==='no-comenzado') f=f.filter(p=>p.status==='no-comenzado');
  else if(currentFilter==='alerta') f=f.filter(p=>p.alert);
  if(currentSearch){const q=currentSearch.toLowerCase();f=f.filter(p=>p.name.toLowerCase().includes(q)||(p.company||'').toLowerCase().includes(q)||(p.invoices||'').toLowerCase().includes(q));}
  return f;
}

          <button class="s-opt${p.status==='completado'?' sel-c':''}"    onclick="event.stopPropagation();chgStatus('${p.id}','completado')">Completado</button>

          <button class="s-opt${p.status==='no-comenzado'?' sel-n':''}"  onclick="event.stopPropagation();chgStatus('${p.id}','no-comenzado')">No comenzado</button>
        </div>
      </div>

      <div class="dsec">
        <div class="dsec-title">Financiero</div>
        <div class="drawer-grid">
          <div class="field-group">
            <label class="field-label">Total proyecto ($)</label>
            <input class="field-input mono" type="number" id="f-total-${p.id}" value="${p.total||''}" onclick="event.stopPropagation()">

            <label class="field-label">Pendiente Vendor ($)</label>
            <input class="field-input mono" type="number" id="f-pven-${p.id}" value="${p.pendingVendor||''}" onclick="event.stopPropagation()">

          <div class="field-group">
            <label class="field-label">Fecha pago Vendor</label>
            <input class="field-input mono" type="date" id="f-dven-${p.id}" value="${p.dateVendor||''}" onclick="event.stopPropagation()">
          </div>
          <div class="field-group">
            <label class="field-label">Compañía / Vendor</label>
            <input class="field-input" type="text" id="f-co-${p.id}" value="${p.company||''}" onclick="event.stopPropagation()">
          </div>
          <div class="field-group">
            <label class="field-label">Alerta / Acción pendiente</label>
            <input class="field-input" type="text" id="f-alert-${p.id}" value="${p.alert||''}" onclick="event.stopPropagation()">
          </div>
          <div class="field-group full">
            <label class="field-label">Notas</label>
            <textarea class="field-input" id="f-notes-${p.id}" onclick="event.stopPropagation()">${p.notes||''}</textarea>
          </div>
        </div>
        <div class="drawer-actions">
          <button class="save-btn" onclick="event.stopPropagation();saveProject('${p.id}')">Guardar cambios</button>
          <button class="pdf-proj-btn" onclick="event.stopPropagation();pdfProyecto('${p.id}')">↓ PDF Proyecto</button>
          <span class="saved-lbl" id="saved-${p.id}">✓ Guardado</span>
          <button class="del-btn" onclick="event.stopPropagation();confirmDelete('${p.id}','${p.name.replace(/'/g,'')}')">Eliminar</button>
        </div>

}

window.toggleRow=function(id){
  openId=openId===id?null:id;
  renderTable();
  if(openId){setTimeout(()=>{const el=document.getElementById('drawer-'+openId);if(el)el.scrollIntoView({behavior:'smooth',block:'nearest'});},60);}
};

window.chgStatus=async function(id,s){
  try{await updateDoc(doc(db,'projects',id),{status:s,updatedAt:serverTimestamp()});showToast('Estado actualizado');}
  catch(e){showToast('Error al guardar');}
};

window.saveProject=async function(id){
  const g=k=>{const el=document.getElementById(k);return el?el.value.trim():'';};
  const gn=k=>{const v=g(k);return v===''?0:parseFloat(v)||0;};
  const data={
    total:      gn(`f-total-${id}`),
    invoices:   g(`f-inv-${id}`),
    pendingCTI: gn(`f-pcti-${id}`),
    dateCTI:    g(`f-dcti-${id}`),
    pendingVendor:gn(`f-pven-${id}`),
    dateVendor: g(`f-dven-${id}`),
    company:    g(`f-co-${id}`),
    alert:      g(`f-alert-${id}`),
    notes:      g(`f-notes-${id}`),
    updatedAt:  serverTimestamp(),
  };
  try{
    await updateDoc(doc(db,'projects',id),data);
    const lbl=document.getElementById('saved-'+id);
    if(lbl){lbl.classList.add('show');setTimeout(()=>lbl.classList.remove('show'),2000);}
  }catch(e){showToast('Error al guardar');}
};

// INIT
async function init(){
  try{
    const app=initializeApp(firebaseConfig);
    db=getFirestore(app);
    const syncDot=document.getElementById('syncDot');
    const syncLabel=document.getElementById('syncLabel');
    let seeded=false;

    onSnapshot(collection(db,'projects'),async snap=>{
      if(!seeded){
        seeded=true;
        if(snap.empty){
          for(const p of SEED){const{id,...data}=p;await setDoc(doc(db,'projects',id),{...data,createdAt:serverTimestamp()});}
        }
      }
      allProjects=snap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(a.num||0)-(b.num||0)); window._allProjectsForPDF=allProjects;
      renderMetrics();renderTable();
      document.getElementById('loadingScreen').style.display='none';
      document.getElementById('appContent').style.display='block';
      syncDot.classList.add('live');syncLabel.textContent='en vivo';
    },err=>{
      syncDot.classList.remove('live');syncLabel.textContent='sin conexión';
      document.getElementById('loadingScreen').innerHTML='<p style="color:var(--red);font-family:var(--mono);font-size:12px;text-align:center;line-height:1.7;max-width:280px;">Error de conexión Firebase.<br>Verifica que Firestore esté activo y en modo test.</p>';
    });
  }catch(e){
    document.getElementById('loadingScreen').innerHTML='<p style="color:var(--red);font-family:var(--mono);font-size:12px;">Error de configuración Firebase.</p>';
  }
}
init();
</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<script>
(function(){
  // ── COLORS ──────────────────────────────────────────────────────────────────
  var C = {
    dark:   [28,28,30],
    mid:    [72,72,74],
    light:  [142,142,147],
    line:   [229,229,234],
    bg:     [242,242,247],
    blue:   [0,122,255],
    green:  [52,199,89],
    amber:  [255,149,0],
    red:    [255,59,48],
    white:  [255,255,255],
    rowalt: [248,248,252],
  };

  function setFill(doc, color){ doc.setFillColor(color[0],color[1],color[2]); }
  function setTxt(doc, color){ doc.setTextColor(color[0],color[1],color[2]); }
  function setDraw(doc, color){ doc.setDrawColor(color[0],color[1],color[2]); }

  function fmt(n){ return (!n&&n!==0)||n===''?'—':'$'+Number(n).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}); }
  function fmtD(d){ return d?d.split('-').reverse().join('/'):'—'; }
  function sLabel(s){ return s==='completado'?'Completado':s==='en-proceso'?'En proceso':'No comenzado'; }
  function sColor(s){ return s==='completado'?C.green:s==='en-proceso'?C.amber:C.light; }
  function todayStr(){ return new Date().toLocaleDateString('es-US',{year:'numeric',month:'long',day:'numeric'}); }

  // ── PDF GENERAL ─────────────────────────────────────────────────────────────
  window.pdfGeneral = function(){
    if(!window.jspdf){ alert('jsPDF no cargó. Revisa tu conexión a internet.'); return; }
    var jsPDF = window.jspdf.jsPDF;
    var doc = new jsPDF({orientation:'landscape',unit:'mm',format:'letter'});
    var W = doc.internal.pageSize.getWidth();
    var H = doc.internal.pageSize.getHeight();
    var projects = window._allProjectsForPDF || [];

    // ── Header bar
    setFill(doc, C.dark); doc.rect(0,0,W,22,'F');
    setTxt(doc, C.white);
    doc.setFontSize(13); doc.setFont('helvetica','bold');
    doc.text('Terminal A \u00b7 RCCL \u2014 Reporte General de Proyectos', 14, 9);
    doc.setFontSize(8); doc.setFont('helvetica','normal');
    setTxt(doc,[190,190,195]);
    doc.text('Puerto de Miami \u00b7 TROAL / SATE   \u00b7   Generado: '+todayStr(), 14, 17);

    // ── Metric boxes
    var pCTI    = projects.reduce(function(a,p){return a+(Number(p.pendingCTI)||0);},0);
    var pVendor = projects.reduce(function(a,p){return a+(Number(p.pendingVendor)||0);},0);
    var comp    = projects.filter(function(p){return p.status==='completado';}).length;
    var enProc  = projects.filter(function(p){return p.status==='en-proceso';}).length;
    var alerts  = projects.filter(function(p){return p.alert;}).length;
    var metrics = [
      {label:'Total',       val:String(projects.length), color:C.blue},
      {label:'Completados', val:String(comp),             color:C.green},
      {label:'En proceso',  val:String(enProc),           color:C.amber},
      {label:'Pend. CTI',   val:fmt(pCTI),                color:C.red},
      {label:'Pend. Vendor',val:fmt(pVendor),             color:C.amber},
      {label:'Alertas',     val:String(alerts),           color:C.red},
    ];
    var mW = (W-28)/metrics.length;
    for(var i=0;i<metrics.length;i++){
      var mx = 14 + i*mW;
      setFill(doc,C.bg); doc.roundedRect(mx, 26, mW-3, 18, 2, 2, 'F');
      doc.setFontSize(6.5); doc.setFont('helvetica','normal'); setTxt(doc,C.light);
      doc.text(metrics[i].label.toUpperCase(), mx+3, 32);
      doc.setFontSize(12); doc.setFont('helvetica','bold');
      setTxt(doc, metrics[i].color);
      doc.text(metrics[i].val, mx+3, 40);
    }

    // ── Main table
    var rows = projects.map(function(p){
      return [
        String(p.num).padStart(2,'0'),
        p.name||'',
        p.company||'—',
        p.invoices||'—',
        sLabel(p.status),
        fmt(p.total),
        fmt(p.pendingCTI),
        fmtD(p.dateCTI),
        fmt(p.pendingVendor),
        fmtD(p.dateVendor),
        p.alert?'!':'',
      ];
    });

    doc.autoTable({
      startY: 48,
      head: [['#','Proyecto','Vendor','Invoice(s)','Estado','Total','Pend. CTI','F. Pago CTI','Pend. Vendor','F. Pago Vendor','!']],
      body: rows,
      styles:{ fontSize:7.5, cellPadding:2.5, font:'helvetica', textColor:C.dark, lineColor:C.line, lineWidth:0.2 },
      headStyles:{ fillColor:C.dark, textColor:C.white, fontStyle:'bold', fontSize:7, halign:'left' },
      alternateRowStyles:{ fillColor:C.rowalt },
      columnStyles:{
        0:{ cellWidth:9,  halign:'center', textColor:C.light },
        1:{ cellWidth:50 },
        2:{ cellWidth:26 },
        3:{ cellWidth:22 },
        4:{ cellWidth:22 },
        5:{ cellWidth:22, halign:'right', fontStyle:'bold' },
        6:{ cellWidth:22, halign:'right' },
        7:{ cellWidth:24, textColor:C.mid },
        8:{ cellWidth:24, halign:'right' },
        9:{ cellWidth:24, textColor:C.mid },
        10:{ cellWidth:8, halign:'center', textColor:C.red },
      },
      didParseCell: function(data){
        if(data.section!=='body') return;
        var p = projects[data.row.index];
        if(!p) return;
        if(data.column.index===4){ data.cell.styles.textColor = sColor(p.status); }
        if(data.column.index===6 && p.pendingCTI>0){ data.cell.styles.textColor = C.red; }
        if(data.column.index===8 && p.pendingVendor>0){ data.cell.styles.textColor = C.amber; }
      },
      margin:{left:14, right:14},
      didDrawPage: function(){
        setFill(doc,C.bg); doc.rect(0,H-10,W,10,'F');
        doc.setFontSize(7); doc.setFont('helvetica','normal'); setTxt(doc,C.light);
        doc.text('Terminal A \u00b7 Puerto de Miami', 14, H-4);
        doc.text('P\u00e1g. '+doc.internal.getCurrentPageInfo().pageNumber, W-14, H-4, {align:'right'});
      }
    });

    // ── Alerts section
    var alertPs = projects.filter(function(p){return p.alert;});
    if(alertPs.length>0){
      var ay = doc.lastAutoTable.finalY+10;
      if(ay+10+alertPs.length*9 > H-14){ doc.addPage(); ay=20; }
      doc.setFontSize(8); doc.setFont('helvetica','bold'); setTxt(doc,C.red);
      doc.text('ACCIONES PENDIENTES ('+alertPs.length+')', 14, ay);
      ay+=6;
      for(var j=0;j<alertPs.length;j++){
        var ap=alertPs[j];
        setFill(doc,[255,240,240]); doc.roundedRect(14,ay,W-28,8,1.5,1.5,'F');
        doc.setFontSize(7); doc.setFont('helvetica','bold'); setTxt(doc,C.dark);
        var prefix='P'+String(ap.num).padStart(2,'0')+' '+ap.name+': ';
        doc.text(prefix, 18, ay+5.5);
        var pw=doc.getTextWidth(prefix);
        doc.setFont('helvetica','normal'); setTxt(doc,C.mid);
        var alertTxt=doc.splitTextToSize(ap.alert, W-36-pw);
        doc.text(alertTxt[0], 18+pw, ay+5.5);
        ay+=10;
      }
    }

    doc.save('Terminal-A-Reporte-General-'+new Date().toISOString().slice(0,10)+'.pdf');
    window.showToast && window.showToast('PDF general generado');
  };

  // ── PDF POR PROYECTO ────────────────────────────────────────────────────────
  window.pdfProyecto = function(id){
    if(!window.jspdf){ alert('jsPDF no cargó. Revisa tu conexión a internet.'); return; }
    var jsPDF = window.jspdf.jsPDF;
    var projects = window._allProjectsForPDF || [];
    var p = null;
    for(var i=0;i<projects.length;i++){ if(projects[i].id===id){p=projects[i];break;} }
    if(!p){ window.showToast && window.showToast('Proyecto no encontrado'); return; }

    var doc = new jsPDF({orientation:'portrait',unit:'mm',format:'letter'});
    var W = doc.internal.pageSize.getWidth();
    var H = doc.internal.pageSize.getHeight();

    // ── Header
    setFill(doc,C.dark); doc.rect(0,0,W,30,'F');
    setTxt(doc,C.white);
    doc.setFontSize(11); doc.setFont('helvetica','bold');
    doc.text('P'+String(p.num).padStart(2,'0')+' \u00b7 '+(p.name||''), 14, 12);
    doc.setFontSize(8); doc.setFont('helvetica','normal');
    setTxt(doc,[190,190,195]);
    doc.text('Terminal A \u00b7 RCCL \u00b7 Puerto de Miami', 14, 20);
    doc.text('Generado: '+todayStr(), 14, 26);

    // Status badge
    var sc = sColor(p.status);
    setFill(doc,sc); doc.roundedRect(W-52,8,38,11,2,2,'F');
    doc.setFontSize(8); doc.setFont('helvetica','bold'); setTxt(doc,C.white);
    doc.text(sLabel(p.status), W-52+19, 15, {align:'center'});

    var y = 38;

    // ── General info row
    setFill(doc,C.bg); doc.roundedRect(14,y,W-28,28,3,3,'F');
    doc.setFontSize(7); doc.setFont('helvetica','normal'); setTxt(doc,C.light);
    doc.text('INFORMACIÓN GENERAL', 20, y+7);

    var halfW = (W-28-6)/2;
    // Left col
    doc.setFontSize(7); setTxt(doc,C.light);
    doc.text('TOTAL DEL PROYECTO', 20, y+14);
    doc.setFontSize(14); doc.setFont('helvetica','bold'); setTxt(doc,C.dark);
    doc.text(fmt(p.total), 20, y+22);
    // Right col
    doc.setFontSize(7); doc.setFont('helvetica','normal'); setTxt(doc,C.light);
    doc.text('VENDOR / COMPAÑÍA', 20+halfW+6, y+14);
    doc.setFontSize(10); doc.setFont('helvetica','bold'); setTxt(doc,C.dark);
    doc.text(p.company||'—', 20+halfW+6, y+22);

    y+=34;

    // ── Invoice row
    if(p.invoices){
      setFill(doc,C.bg); doc.roundedRect(14,y,W-28,14,3,3,'F');
      doc.setFontSize(7); doc.setFont('helvetica','normal'); setTxt(doc,C.light);
      doc.text('INVOICE(S)', 20, y+6);
      doc.setFontSize(10); doc.setFont('helvetica','bold'); setTxt(doc,C.dark);
      doc.text(p.invoices, 20, y+12);
      y+=20;
    }

    // ── CTI / Vendor boxes
    var bW = halfW;
    // CTI
    var ctiColor = (p.pendingCTI>0) ? [255,240,240] : [236,252,243];
    setFill(doc,ctiColor); doc.roundedRect(14,y,bW,32,3,3,'F');
    doc.setFontSize(7); doc.setFont('helvetica','normal'); setTxt(doc,C.light);
    doc.text('PENDIENTE CTI', 20, y+8);
    doc.setFontSize(16); doc.setFont('helvetica','bold');
    setTxt(doc, p.pendingCTI>0 ? C.red : C.green);
    doc.text(fmt(p.pendingCTI), 20, y+20);
    doc.setFontSize(8); doc.setFont('helvetica','normal'); setTxt(doc,C.mid);
    doc.text('Fecha de pago: '+fmtD(p.dateCTI), 20, y+28);

    // Vendor
    var venColor = (p.pendingVendor>0) ? [255,248,235] : [236,252,243];
    setFill(doc,venColor); doc.roundedRect(14+bW+6,y,bW,32,3,3,'F');
    doc.setFontSize(7); doc.setFont('helvetica','normal'); setTxt(doc,C.light);
    doc.text('PENDIENTE VENDOR', 20+bW+6, y+8);
    doc.setFontSize(16); doc.setFont('helvetica','bold');
    setTxt(doc, p.pendingVendor>0 ? C.amber : C.green);
    doc.text(fmt(p.pendingVendor), 20+bW+6, y+20);
    doc.setFontSize(8); doc.setFont('helvetica','normal'); setTxt(doc,C.mid);
    doc.text('Fecha de pago: '+fmtD(p.dateVendor), 20+bW+6, y+28);

    y+=38;

    // ── Alert box
    if(p.alert){
      setFill(doc,[255,240,240]); doc.roundedRect(14,y,W-28,16,2,2,'F');
      doc.setFontSize(7.5); doc.setFont('helvetica','bold'); setTxt(doc,C.red);
      doc.text('ACCION PENDIENTE', 20, y+7);
      doc.setFont('helvetica','normal'); setTxt(doc,C.mid);
      var aLines = doc.splitTextToSize(p.alert, W-40);
      doc.text(aLines, 20, y+13);
      y += 10 + aLines.length*4 + 6;
    }

    // ── Notes
    if(p.notes){
      doc.setFontSize(8); doc.setFont('helvetica','bold'); setTxt(doc,C.mid);
      doc.text('NOTAS Y OBSERVACIONES', 14, y+5);
      setDraw(doc,C.line); doc.line(14,y+7,W-14,y+7);
      y+=12;
      doc.setFontSize(9); doc.setFont('helvetica','normal'); setTxt(doc,C.dark);
      var nLines = doc.splitTextToSize(p.notes||'', W-28);
      doc.text(nLines, 14, y);
    }

    // ── Footer
    setFill(doc,C.bg); doc.rect(0,H-12,W,12,'F');
    doc.setFontSize(7); doc.setFont('helvetica','normal'); setTxt(doc,C.light);
    doc.text('Terminal A \u00b7 RCCL \u00b7 Puerto de Miami', 14, H-5);
    doc.text('Reporte confidencial \u2014 TROAL / SATE', W-14, H-5, {align:'right'});

    var safeName = (p.name||'proyecto').replace(/[^a-zA-Z0-9]/g,'-').replace(/-+/g,'-');
    doc.save('P'+String(p.num).padStart(2,'0')+'-'+safeName+'.pdf');
    window.showToast && window.showToast('PDF generado: '+p.name);
  };
})();
</script>
